<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="search-bar">
                <search>
                    <form class="search" action="" method="get">
                        <button type="submit"><img src="./icons/search.svg" alt="search button"></button>
                        <input id="search" type="search" name="q">
                    </form>
                </search>
                <div class="color-theme">
                    <button><img src="./icons/moon.svg" alt="change to dark-mode button "></button>
                </div>
                <div class="notification">
                    <button><img src="./icons/bell.svg" alt="notifications button"></button>
                </div>
                <div class="user-icon">
                    <button><img src="./icons/user.svg" alt="user button"></button>
                </div>
                <div class="user-name">
                    <p>John S<span class="hide-name">mith</span></p>
                </div>
            </div>
            <div class="user-bar">
                <div class="user-avatar"><img src="./images/user.png" alt="user avatar"></div>
                <div class="greetings-name">
                    <div><p>Hi there,</p></div>
                    <div class="user-name user-main"><p>John Smith </p><p>@<a href="">jsmith</a></p></div>
                </div>
                <button class="new"><p>New</p><img src="./icons/new.svg" alt="new button"></button>
                <button class="upload"><p>Upload</p><img src="./icons/upload.svg" alt="upload button"></button>
                <button class="share"><p>Share</p><img src="./icons/share.svg" alt="share button"></button>

            </div>
        </header>

        <div class="sidebar">
            #sidebar

        </div>

        <div class="main-content">
            #main-content

        </div>
    </div>
</body>

</html>
